<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Satisfação | Câmara Municipal de Doresópolis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Variáveis de Cores (Padrão do novo layout) */
        :root { 
            --cor-fundo: #f2f2f2; 
            --cor-primaria: #025d3b; 
            --cor-primaria-hover: #01472c; 
            --cor-primaria-bg: rgba(2, 93, 59, 0.08); 
            --branco: #ffffff; 
            --texto-escuro: #1f2937; 
            --texto-medio: #4b5563; 
            --texto-claro: #6b7280; 
            --borda: #e5e7eb; 
            --transicao: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--cor-fundo); 
            color: var(--texto-escuro); 
            line-height: 1.6; 
            padding: 40px 20px; 
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Botão Voltar Padrão */
        .btn-voltar { 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            text-decoration: none; 
            color: var(--texto-medio); 
            font-size: 0.9rem; 
            font-weight: 600; 
            margin-bottom: 30px; 
            transition: var(--transicao); 
            padding: 8px 16px; 
            border-radius: 8px; 
            background-color: transparent; 
        }
        
        .btn-voltar:hover { 
            color: var(--cor-primaria); 
            background-color: var(--cor-primaria-bg); 
            transform: translateX(-4px); 
        }
        
        .btn-voltar svg { width: 20px; height: 20px; fill: currentColor; }
        
        /* Cabeçalho */
        .header-transparencia { 
            text-align: center; 
            margin-bottom: 40px; 
            animation: fadeIn 0.6s ease-out; 
        }
        
        .header-transparencia svg { 
            width: 40px; 
            height: 40px; 
            fill: var(--cor-primaria); 
            margin-bottom: 10px; 
        }
        
        .header-transparencia h1 { 
            font-size: 2.5rem; 
            color: var(--texto-escuro); 
            font-weight: 700; 
            margin-bottom: 15px; 
        }
        
        /* Barra de Informações (Breadcrumbs) */
        .info-bar { 
            display: flex; 
            justify-content: flex-start; 
            align-items: center; 
            padding: 12px 0; 
            border-bottom: 1px solid var(--borda); 
            margin-bottom: 30px; 
            font-size: 0.9rem; 
            color: var(--texto-claro);
            flex-wrap: wrap;
            gap: 15px;
        }

        .breadcrumb a {
            color: var(--texto-medio);
            text-decoration: none;
            transition: var(--transicao);
        }
        
        .breadcrumb a:hover {
            color: var(--cor-primaria);
        }
        
        .breadcrumb span {
            margin: 0 4px;
            color: var(--borda);
        }

        /* Caixa de Conteúdo Padrão */
        .conteudo-box { 
            background-color: var(--branco); 
            border-radius: 16px; 
            padding: 40px; 
            border: 1px solid var(--borda); 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); 
            animation: slideUp 0.8s ease-out; 
            margin-bottom: 30px; 
        }
        
        .conteudo-titulo {
            font-size: 1.2rem;
            color: var(--cor-primaria);
            font-weight: 600;
            margin-bottom: 24px;
        }

        /* Grid de Menus Grandes */
        .grid-menus {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .menu-card {
            background-color: var(--cor-fundo);
            border: 1px solid var(--borda);
            border-radius: 12px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--texto-escuro);
            transition: var(--transicao);
        }

        .menu-card:hover {
            border-color: var(--cor-primaria);
            background-color: var(--cor-primaria-bg);
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(2, 93, 59, 0.08);
        }

        .menu-card svg {
            width: 40px;
            height: 40px;
            fill: var(--cor-primaria);
            margin-bottom: 16px;
            transition: var(--transicao);
        }

        .menu-card:hover svg {
            transform: scale(1.1);
        }

        .menu-card span {
            font-size: 1.2rem;
            font-weight: 600;
            transition: var(--transicao);
        }

        .menu-card:hover span {
            color: var(--cor-primaria);
        }

        /* Animações */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Responsividade */
        @media (max-width: 768px) {
            .header-transparencia h1 { font-size: 2rem; }
            .conteudo-box { padding: 24px; }
            .grid-menus { grid-template-columns: 1fr; }
        }
    </style>
</head>
